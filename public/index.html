<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0D1324" />
    <meta name="color-scheme" content="dark" />

    <!-- SEO -->
    <title>AdiYogi — Anonymous Mental Health Peer Support Community</title>
    <meta name="description" content="AdiYogi is a free, anonymous peer-support community for mental health. Share your thoughts, find support, and connect with others — no registration required. 24/7 community support for anxiety, depression, trauma, and more." />
    <meta name="keywords" content="mental health, anonymous support, peer support, anxiety, depression, trauma, PTSD, crisis help, mental wellness, SIH 2024" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Team Adiyogi" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AdiYogi — Anonymous Mental Health Peer Support" />
    <meta property="og:description" content="A safe, anonymous peer community for mental health support. No registration, no judgment — 24/7 community always here for you." />
    <meta property="og:site_name" content="AdiYogi" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AdiYogi — Mental Health Support" />
    <meta name="twitter:description" content="Free, anonymous peer support for mental health. Always available." />

    <!-- Fonts — Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- PWA / Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Safe area support for notched phones -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AdiYogi" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run AdiYogi.</noscript>
    <div id="root"></div>
  </body>
</html>
